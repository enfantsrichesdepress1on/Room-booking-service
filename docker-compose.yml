version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: room_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d room_booking"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: room_booking
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
      JWT_SECRET: supersecret
      CONFERENCE_BASE_URL: https://conference.mock.local/meeting
    ports:
      - "8080:8080"

volumes:
  postgres_data:
